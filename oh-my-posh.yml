# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

final_space: true
version: 3
console_title_template: '{{ .Shell }} in {{ .Folder }}'
console_title_template: '{{ .Shell }} in {{ .Folder }} @ {{ .HostName }}'

palette:
  black: '#262B44'
  blue: '#4B95E9'
  light-blue: '#6BB5FF'
  green: '#59C9A5'
  orange: '#F07623'
  red: '#D81E5B'
  white: '#E0DEF4'
  gray: '#AAAAAA'
  yellow: '#F3AE35'

upgrade:
  source: cdn
  interval: 168h
  auto: true
  notice: false

#secondary_prompt:
#  template: '<p:yellow,transparent>о‚¶</><,p:yellow>{{ .PWD }} </><p:yellow,transparent>о‚°</> '
#  foreground: p:black
#  background: transparent

#transient_prompt:
#  template: '<p:yellow,transparent>о‚¶</><,p:yellow>{{ .PWD }} </><p:yellow,transparent>о‚°</> '
#  foreground: p:black
#  background: transparent

blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:

        # print which shell we're using
      - type: shell
        style: powerline
        foreground: "#ffffff"
        background: "#0077c2"

        # print hostname
      - type: session
        style: diamond
        template: ' {{ .HostName }} '
        foreground: p:black
        background: p:yellow

        # print name of virtual environment
      - type: python
        style: diamond
        foreground: p:black
        background: p:white
        #leading_diamond: о‚є
        #trailing_diamond: о‚°
        template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Major }}.{{ .Minor }}{{ end }} '
        properties:
          display_mode: 'environment'
          fetch_virtual_env: true
          fetch_version: true
          prefix: "\uE235 ("
          postfix: ") "

        # Git and other version control status
      - type: git
        style: diamond
        #leading_diamond: о‚є
        #trailing_diamond: о‚ё
        template: ' {{ .HEAD }}{{ if .Working.Changed }} пЃ„ {{ .Working.String }}{{ end }}{{ if .Staging.Changed }} пЃ† {{ .Staging.String }}{{ end }} '
        foreground: p:black
        background: p:green
        properties:
          branch_max_length: 25
          fetch_status: true
          fetch_upstream_icon: true

      - type: text
        style: plain
        template: "\n"

        # If in SSH, print an indicator, then print username
      - type: session
        style: diamond
        #leading_diamond: о‚ѕ
        #trailing_diamond: о‚°
        powerline_symbol: о‚°
        template: ' {{ if .SSHSession }}о®© {{ end }}{{ .UserName }} '
        foreground: p:black
        background: p:yellow

        # print admin status
      - type: root
        template: ' пѓ§ '
        powerline_symbol: о‚°
        foreground: p:white
        background: p:yellow
        style: diamond

        # Print current working directory
      - type: path
        template: ' оЄѓ  {{ path .Path .Location }} '
        powerline_symbol: о‚°
        trailing_diamond: о‚°
        foreground: p:white
        background: p:orange
        style: diamond
        properties:
          style: agnoster_full
          folder_separator_icon: /
